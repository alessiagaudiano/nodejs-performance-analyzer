services:
  frontend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - CHOKIDAR_USEPOLLING=true
      - WDS_SOCKET_PORT=0
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: sh -c "npm ci && npm start"

volumes:
  node_modules:
